jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: npm ci

      - name: Install browsers
        run: npx playwright install --with-deps

      # ✅ DEBUG STEP (CORRECT PLACE)
      - name: Debug user
        run: echo "Running as $USERNAME"
        env:
          USERNAME: ${{ secrets.USERNAME1 }}

      # ✅ Auth step
      - name: Generate Auth
        run: npx playwright test tests/setup/auth.setup.spec.js
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME: ${{ secrets.USERNAME1 }}
          PASSWORD: ${{ secrets.PASSWORD }}

      # ✅ Run tests
      - name: Run Tests
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME: ${{ secrets.USERNAME1 }}
          PASSWORD: ${{ secrets.PASSWORD }}