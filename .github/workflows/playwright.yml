name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        shard: [1, 2]
        totalShards: [2]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: npm ci

      - name: Install browsers
        run: npx playwright install --with-deps

      # ✅ DEBUG STEP — verify secret is injected (value stays masked)
      - name: Debug user
        run: echo "Running as $USERNAME"
        env:
          USERNAME: ${{ secrets.USERNAME1 }}

      # ✅ FIX 4: Single test command — config's `dependencies: ['setup']` ensures
      # auth.setup.spec.js runs first and writes auth.json before any browser project starts.
      # No separate auth step needed — and avoids the "project not found" error
      # that occurs if the old config without the setup project is still in the repo.
      - name: Run tests (sharded)
        run: npx playwright test --shard=${{ matrix.shard }}/${{ matrix.totalShards }} --grep "@smoke"
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME: ${{ secrets.USERNAME1 }}
          PASSWORD: ${{ secrets.PASSWORD }}

      # ✅ FIX 5: Verify auth.json was written (runs after tests, useful for debugging)
      - name: Verify auth.json exists
        if: always()
        run: |
          if [ ! -f "./auth.json" ]; then
            echo "❌ auth.json was NOT generated."
          else
            echo "✅ auth.json found:"
            cat ./auth.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Cookies count: {len(d[\"cookies\"])}')"
          fi

      # ✅ FIX 6: Always upload the HTML report so you can debug failures
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results

      # ✅ BONUS: Upload auth.json as artifact for debugging auth issues
      - name: Upload auth.json (debug)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auth-state-${{ matrix.shard }}
          path: auth.json
          retention-days: 3
          allure-report:
  needs: test
  runs-on: ubuntu-latest

  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 18

    - run: npm ci

    # Install Allure CLI
    - run: npm install -g allure-commandline

    # Download all shard results
    - name: Download Allure Results
      uses: actions/download-artifact@v4
      with:
        path: allure-results-all

    # Merge results
    - name: Generate Allure Report
      run: |
        mkdir merged-results
        cp -r allure-results-all/*/* merged-results || true
        allure generate merged-results -o allure-report --clean

    # Upload final report
    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report